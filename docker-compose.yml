version: '3.8'

services:
  hermes:
    build: .
    container_name: ${CONTAINER_NAME:-hermes-agent}
    restart: unless-stopped
    
    # CRITICAL for Coolify: Enable TTY and Stdin for QR code display
    tty: true
    stdin_open: true
    
    environment:
      # Required: API Key
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?Error: OPENROUTER_API_KEY is required}
      
      # Model configuration
      - MODEL=${MODEL:-openrouter:moonshotai/kimi-k2.5}
      - AGENT_NAME=${AGENT_NAME:-Hermes}
      - MAX_TURNS=${MAX_TURNS:-60}
      
      # UX Settings
      - TOOL_PROGRESS=${TOOL_PROGRESS:-off}
      - SHOW_REASONING=${SHOW_REASONING:-false}
      
      # WhatsApp Configuration (should be set in Coolify env vars)
      - WHATSAPP_MODE=${WHATSAPP_MODE}
      - WHATSAPP_ALLOWED_USERS=${WHATSAPP_ALLOWED_USERS}
      - WHATSAPP_DEBUG=${WHATSAPP_DEBUG}
      
      # Gateway
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-false}
    
    volumes:
      # NOTE: For Coolify, you MUST configure these as "Persistent" 
      # in the Coolify UI (Storage tab) for data to survive rebuilds
      - hermes_data:/opt/data
      - hermes_whatsapp_session:/opt/data/whatsapp/session
    
    ports:
      # Gateway API
      - "8080:8080"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hermes_data:
    name: ${VOLUME_NAME:-hermes_data}
  hermes_whatsapp_session:
    name: ${VOLUME_NAME:-hermes_data}_whatsapp_session
